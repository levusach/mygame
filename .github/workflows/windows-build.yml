name: Windows build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-nsis

      - name: Build Windows executable
        run: make win WIN_CXX=g++

      - name: Package app folder
        run: |
          rm -rf dist/windows
          mkdir -p dist/windows
          cp world.exe README.md dist/windows/
          while IFS= read -r dll; do
            if [ -f "$dll" ]; then
              cp -n "$dll" dist/windows/
            fi
          done < <(ldd world.exe | awk '/ucrt64/ {print $3}' | sort -u)
          cd dist
          zip -r TheWorld-Windows.zip windows

      - name: Build installer
        run: makensis installer/theworld.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TheWorld-Windows
          path: |
            dist/TheWorld-Windows.zip
            dist/TheWorldSetup.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TheWorld-Windows.zip
            dist/TheWorldSetup.exe
